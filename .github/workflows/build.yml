name: Build & Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'data/raw/**'
      - 'data/*.json'
      - 'src/**'
      - 'docs/**'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  schedule:
    # Diario a las 08:30 CET (07:30 UTC) — actualiza precios
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Build dashboard JSON (full pipeline)
        run: python -m src.build
        env:
          PYTHONUNBUFFERED: '1'
          # Email notifications (configure as GitHub Secrets if you want them)
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # WhatsApp via CallMeBot (configure as GitHub Secrets if you want them)
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}

      - name: Commit processed data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json data/processed/*.json data/earnings.json
          if ! git diff --cached --quiet; then
            git commit -m "build: refresh dashboard data [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
