name: Build & Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'data/raw/**'
      - 'src/**'
      - 'docs/**'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  schedule:
    # Diario a las 08:30 CET (07:30 UTC) — actualiza precios
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Build dashboard JSON
        run: python -m src.build
        env:
          # Si yfinance falla con 403 en CI, el build sigue adelante con stale prices.
          PYTHONUNBUFFERED: '1'

      - name: Commit processed data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/watchlist.json data/processed/watchlist.json
          if ! git diff --cached --quiet; then
            git commit -m "build: refresh watchlist [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
